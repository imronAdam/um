<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UM ERP - ระบบบริหารจัดการ</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="UM ERP">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/imronsamoh/UM-Logo@main/UM_ERP.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/imronsamoh/UM-Logo@main/UM_ERP.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
        }
        
        .container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* Fallback ถ้า iframe ไม่โหลด */
        .direct-link {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe 
            id="mainFrame"
            scrolling="yes" 
            src="https://script.google.com/macros/s/AKfycbz_iZb39vNama9babE9Ruy59T14aJlHPRmxYRosEAyzjIAaZpaMRxJoHlvQtp4G8CiB/exec" 
            frameborder="0"
            title="UM ERP Application"
            allow="camera; microphone; geolocation"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
        </iframe>
        
        <div class="direct-link" id="fallback">
            <p>กำลังโหลดระบบ UM ERP...</p>
            <a href="https://script.google.com/macros/s/AKfycbz_iZb39vNama9babE9Ruy59T14aJlHPRmxYRosEAyzjIAaZpaMRxJoHlvQtp4G8CiB/exec" 
               target="_blank" 
               style="color: #2196F3; text-decoration: none;">
               คลิกที่นี่ถ้าระบบไม่โหลด
            </a>
        </div>
    </div>

    <script>
        // ตรวจสอบว่า iframe โหลดได้หรือไม่
        const iframe = document.getElementById('mainFrame');
        const fallback = document.getElementById('fallback');
        
        iframe.onerror = function() {
            fallback.style.display = 'block';
        };
        
        // ถ้าใช้เวลาโหลดนานเกินไป แสดง fallback
        setTimeout(() => {
            try {
                // ตรวจสอบว่า iframe โหลดได้หรือไม่
                if (iframe.contentDocument === null || iframe.contentDocument.body.innerHTML === '') {
                    fallback.style.display = 'block';
                }
            } catch(e) {
                // CORS error - iframe อาจบล็อก
                console.log('Cannot access iframe content - CORS policy');
            }
        }, 10000);

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('SW registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
